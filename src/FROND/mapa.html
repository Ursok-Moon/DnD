<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Mapas D&D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/src/CSS/mapa.css">
    <link rel="stylesheet" href="/src/CSS/sidebar.css">
    <link rel="stylesheet" href="/src/CSS/tutorial.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a class="sidebar-logo">
                <i class="fas fa-book-open"></i>
                <span>El Escriba</span>
            </a>
        </div>
        
        <nav class="sidebar-nav">
            <div class="sidebar-item">
                <a href="/src/FROND/hoja.html" class="sidebar-link" id="nav-hoja">
                    <i class="fas fa-scroll"></i>
                    <span>hoja - PJ</span>
                </a>
            </div>
            
            <div class="sidebar-item">
                <a href="/src/FROND/Cartas.html" class="sidebar-link" id="nav-cartas">
                    <i class="fas fa-crown"></i>
                    <span>Cartas</span>
                </a>
            </div>
            
            <div class="sidebar-item">
                <a href="/src/FROND/DMS.html" class="sidebar-link" id="nav-bestias">
                    <i class="fas fa-dragon"></i>
                    <span>DM Screen</span>
                </a>
            </div>
            
            <div class="sidebar-item">
                <a href="/src/FROND/mapa.html" class="sidebar-link active" id="nav-mapa">
                    <i class="fas fa-map"></i>
                    <span>Mapa</span>
                </a>
            </div>
            
            <div class="sidebar-item">
                <a href="/src/FROND/dados.html" class="sidebar-link" id="nav-dados">
                    <i class="fas fa-dice-d20"></i>
                    <span>Lanzar Dados</span>
                </a>
            </div>
            
            <div class="sidebar-item">
                <a href="#" class="sidebar-link" id="nav-ajustes">
                    <i class="fas fa-cog"></i>
                    <span>Ajustes</span>
                </a>
            </div>
        </nav>
    </aside>
    
    <div class="mapa-container">
        <div class="mapa-header">
            <h2>
                <i class="fas fa-map"></i>
                Generador de Mapas
            </h2>
        </div>

        <div class="mapa-controls">
            <div class="control-group">
                <label><i class="fas fa-arrows-alt-h"></i> Ancho:</label>
                <input type="number" id="map-width" min="1" max="20" value="5">
            </div>
            <div class="control-group">
                <label><i class="fas fa-arrows-alt-v"></i> Alto:</label>
                <input type="number" id="map-height" min="1" max="20" value="5">
            </div>
            <button id="generate-map" class="btn">
                <i class="fas fa-cogs"></i> Generar
            </button>
            <button id="reset-map" class="btn btn-reset">
                <i class="fas fa-undo-alt"></i> Reset
            </button>
            <button id="clear-map" class="btn btn-small">
                <i class="fas fa-eraser"></i> Limpiar Colores
            </button>
            
            <div class="color-palette">
                <span><i class="fas fa-palette"></i> Pintar:</span>
                <div class="color-options">
                    <button class="color-btn default active" title="Default" style="background: #f5e6d3;"></button>
                    <button class="color-btn danger" title="Peligro" style="background: #ffcccb;"></button>
                    <button class="color-btn warning" title="Advertencia" style="background: #fff3cd;"></button>
                    <button class="color-btn success" title="Seguro" style="background: #d4edda;"></button>
                    <button class="color-btn info" title="Información" style="background: #d1ecf1;"></button>
                    <button class="color-btn dark" title="Oscuro" style="background: #343a40;"></button>
                    <button class="color-btn water" title="Agua" style="background: #b0e0e6;"></button>
                    <button class="color-btn forest" title="Bosque" style="background: #c1e1c1;"></button>
                    <button class="color-btn mountain" title="Montaña" style="background: #d3d3d3;"></button>
                    <button class="color-btn desert" title="Desierto" style="background: #f4e4c1;"></button>
                </div>
            </div>
            
            <button id="export-map" class="btn btn-small">
                <i class="fas fa-download"></i> Exportar
            </button>

            <!-- SECCIÓN DE NOTAS DEL MAPA - RESTAURADA -->
            <div class="map-notes-section">
                <div class="notes-icon">
                    <i class="fas fa-scroll"></i>
                </div>
                <div class="notes-content">
                    <div class="notes-label">
                        <i class="fas fa-quill-nib"></i>
                        Notas del Dungeon Master
                    </div>
                    <textarea id="map-notes" class="map-notes-textarea" 
                        placeholder="Escribe aquí las notas de la sesión, descripciones de habitaciones, encuentros planeados, tesoros, etc..."></textarea>
                    <div class="notes-metadata">
                        <span>
                            <i class="fas fa-clock"></i>
                            Última edición: <span id="last-edited">--:--</span>
                        </span>
                        <span>
                            <i class="fas fa-font"></i>
                            <span id="words-count">0 palabras</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- INVENTARIO DE FICHAS -->
        <div class="token-inventory">
            <h3><i class="fas fa-chess-board"></i> Inventario de Fichas</h3>
            <div class="inventory-container" id="token-inventory-container">
                <!-- Las fichas se generarán con JavaScript -->
            </div>
        </div>

        <div class="grid-wrapper">
            <div id="mapa-grid" class="mapa-grid"></div>
        </div>

        <div class="info-panel">
            <h3 class="panel-title">
                <i class="fas fa-info-circle"></i>
                Leyenda del Mapa
            </h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-shield-alt"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">Jugadores</div>
                        <div class="stat-value" id="player-count">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-skull"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">Enemigos/Jefes</div>
                        <div class="stat-value" id="enemy-count">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-scroll"></i></div>
                    <div class="stat-info">
                        <div class="stat-label">NPCs/Item</div>
                        <div class="stat-value" id="notes-count">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay de carga (oculto por defecto) -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-cog"></i>
            <p>Generando mapa...</p>
        </div>
    </div>

    <!-- Overlay y pop-up para edición de fichas (se generan dinámicamente con JS) -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="/src/JS/mapa.js"></script>
    <script src="/src/JS/sidebar.js"></script>
    <script src="/src/JS/tutorial.js"></script>
    
</body>
</html>
